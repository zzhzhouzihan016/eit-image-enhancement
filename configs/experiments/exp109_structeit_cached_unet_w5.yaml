# ================= 实验基本信息 =================
experiment_name: "exp109_structeit_cached_unet_w5"
save_dir: "outputs/experiments/exp109_structeit_cached_unet_w5"
seed: 42

# ================= 数据集配置 =================
data:
  dataset_type: "structeit_cached"
  cache_root: "data/cache/structeit_window5_stride2"
  batch_size: 96
  num_workers: 4
  persistent_workers: true
  prefetch_factor: 4
  shard_cache_size: 16

# ================= 模型配置 =================
model:
  name: "st_unet"
  params:
    n_frames: 5
    n_classes: 1
    bilinear: true

# ================= 训练超参数 =================
train:
  epochs: 40
  learning_rate: 0.0001
  weight_decay: 1e-5
  optimizer: "AdamW"
  scheduler: "CosineAnnealingLR"

  amp:
    enable: true

  loss_weights:
    l1: 1.0
    roi: 0.0
    edge: 0.1
    temporal: 0.0

  monitor_split: "val"
  monitor_metric: "ssim"
  monitor_mode: "max"

  early_stopping:
    enable: false
    patience: 8
    min_delta: 0.0

logging:
  save_freq: 5
  val_freq: 2
  print_freq: 10

wandb:
  enable: false
  project: "EIT_Enhancement"
  entity: null
  name: "Exp109_StructEIT_Cached_UNet_W5"
  tags: ["structeit", "cached", "window5", "single-source", "temporal-test", "unet"]
