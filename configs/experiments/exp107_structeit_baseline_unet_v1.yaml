# ================= 实验基本信息 =================
experiment_name: "exp107_structeit_baseline_unet_v1"
save_dir: "outputs/experiments/exp107_structeit_baseline_unet_v1"
seed: 42

# ================= 数据集配置 =================
data:
  dataset_type: "structeit_single_source"
  dataset_root: "data/processed/train_sim/struct_eit"
  input_key: "greit_img"
  target_key: "target_img"
  window_size: 1
  target_mode: "middle"
  batch_size: 128
  num_workers: 8

  normalization:
    enable: true
    strategy: "train_split"
    cache: true

  foreground_mask:
    enable: true
    threshold_abs: 1.0e-6

  augmentation:
    enable: false

  case_split:
    train_ratio: 0.7
    val_ratio: 0.15

# ================= 模型配置 =================
model:
  name: "st_unet"
  params:
    n_frames: 1
    n_classes: 1
    bilinear: true

# ================= 训练超参数 =================
train:
  epochs: 40
  learning_rate: 0.0001
  weight_decay: 1e-5
  optimizer: "AdamW"
  scheduler: "CosineAnnealingLR"

  loss_weights:
    l1: 1.0
    roi: 0.0
    edge: 0.1
    temporal: 0.0

  monitor_split: "val"
  monitor_metric: "ssim"
  monitor_mode: "max"

  early_stopping:
    enable: true
    patience: 8
    min_delta: 0.0

logging:
  save_freq: 5
  val_freq: 1
  print_freq: 10

wandb:
  enable: false
  project: "EIT_Enhancement"
  entity: null
  name: "Exp107_StructEIT_Baseline_UNet_v1"
  tags: ["structeit", "baseline", "single-source", "single-frame", "unet"]
