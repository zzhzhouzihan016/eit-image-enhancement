# ================= 实验基本信息 =================
experiment_name: "exp108_structeit_cached_unet_v1"
save_dir: "outputs/experiments/exp108_structeit_cached_unet_v1"
seed: 42

# ================= 数据集配置 =================
data:
  dataset_type: "structeit_cached"
  cache_root: "data/cache/structeit_baseline_stride2"
  batch_size: 256
  num_workers: 12
  persistent_workers: true
  prefetch_factor: 4
  shard_cache_size: 1

# ================= 模型配置 =================
model:
  name: "st_unet"
  params:
    n_frames: 1
    n_classes: 1
    bilinear: true

# ================= 训练超参数 =================
train:
  epochs: 40
  learning_rate: 0.0001
  weight_decay: 1e-5
  optimizer: "AdamW"
  scheduler: "CosineAnnealingLR"

  amp:
    enable: true

  loss_weights:
    l1: 1.0
    roi: 0.0
    edge: 0.1
    temporal: 0.0

  monitor_split: "val"
  monitor_metric: "ssim"
  monitor_mode: "max"

  early_stopping:
    enable: true
    patience: 8
    min_delta: 0.0

logging:
  save_freq: 5
  val_freq: 2
  print_freq: 10

wandb:
  enable: false
  project: "EIT_Enhancement"
  entity: null
  name: "Exp108_StructEIT_Cached_UNet_v1"
  tags: ["structeit", "cached", "baseline", "single-source", "single-frame", "unet"]
